server:
  port: 8084

spring:
  application:
    name: mall-order

  # 数据源配置
  datasource:
    url: jdbc:mysql://192.168.68.150:3306/mall_order?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true   
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置（分布式锁）
  data:
    redis:
      host: 192.168.68.150
      port: 6379
      database: 3
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ 配置（发送订单消息）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mall.order.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.mall.order: debug
    com.mall.order.mapper: debug

jwt:
  secret: mall-secret-key-2024-spring-security-jwt-token