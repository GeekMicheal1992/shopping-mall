server:
  port: 8083

spring:
  application:
    name: mall-product

  # 数据源配置
  datasource:
    url: jdbc:mysql://192.168.68.150:3306/mall_product?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true   
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  # Redis 配置（商品缓存）
  data:
    redis:
      host: 192.168.68.150
      port: 6379
      database: 2
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ 配置（接收订单消息）
  rabbitmq:
    host: 192.168.68.150
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

# 日志配置
logging:
  level:
    com.mall.product: debug
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mall.product.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: mall-secret-key-2024-spring-security-jwt-token

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always