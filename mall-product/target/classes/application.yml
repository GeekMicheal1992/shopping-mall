server:
  port: 8083

spring:
  application:
    name: mall-product

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/mall_product?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # JPA 配置
  jpa:
    database: mysql
    show-sql: true
    hibernate:
      ddl-auto: update  # 开发环境用 update，生产环境用 validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  # Redis 配置（商品缓存）
  data:
    redis:
      host: localhost
      port: 6379
      database: 2
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ 配置（接收订单消息）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

# 日志配置
logging:
  level:
    com.mall.product: debug
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace