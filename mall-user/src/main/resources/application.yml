server:
  port: 8082

spring:
  application:
    name: mall-user
    
  servlet:
    multipart: 
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: file:./uploads/
  # 数据源配置
  datasource:
    url: jdbc:mysql://192.168.68.150:3306/mall_user?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true   
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 连接池配置
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis 配置（用户信息缓存）
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mall.user.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.mall.user: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

avatar:
  upload-path: D:/mall-uploads/avatars/
  url-prefix: /avatars/
jwt:
  secret: mall-secret-key-2024-spring-security-jwt-token